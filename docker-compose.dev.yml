version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: infradesk-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: infradesk
      POSTGRES_PASSWORD: infradesk
      POSTGRES_DB: infradesk
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data_dev:
