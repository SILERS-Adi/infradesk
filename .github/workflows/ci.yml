name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json
      - name: Install
        working-directory: backend-v2
        run: npm ci
      - name: Prisma generate
        working-directory: backend-v2
        env:
          DATABASE_URL: postgresql://x:y@127.0.0.1:5432/dummy
          DATABASE_URL_BG: postgresql://x:y@127.0.0.1:5432/dummy
        run: npx prisma generate
      - name: Prisma validate
        working-directory: backend-v2
        env:
          DATABASE_URL: postgresql://x:y@127.0.0.1:5432/dummy
          DATABASE_URL_BG: postgresql://x:y@127.0.0.1:5432/dummy
        run: npx prisma validate
      - name: TypeScript check
        working-directory: backend-v2
        run: npx tsc --noEmit
      - name: Audit (high)
        working-directory: backend-v2
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true   # fail wynik widoczny ale nie block jeszcze

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Install
        working-directory: frontend-v2
        run: npm ci
      - name: TypeScript check
        working-directory: frontend-v2
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend-v2
        run: npm run build
      - name: Audit (high)
        working-directory: frontend-v2
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check (py_compile)
        working-directory: agent
        run: |
          python -m compileall -q v5
        shell: pwsh

  migrations-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: infradesk_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json
      - name: Install
        working-directory: backend-v2
        run: npm ci
      - name: Prepare DB roles + extensions
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U ci -d infradesk_ci -c "CREATE ROLE infradesk_v2 LOGIN NOBYPASSRLS PASSWORD 'x';"
          psql -h localhost -U ci -d infradesk_ci -c "CREATE ROLE infradesk_v2_bg LOGIN BYPASSRLS PASSWORD 'x';"
          psql -h localhost -U ci -d infradesk_ci -c "CREATE EXTENSION IF NOT EXISTS vector;" || echo "vector ext optional"
      - name: Run migrations
        working-directory: backend-v2
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/infradesk_ci
          DATABASE_URL_BG: postgresql://ci:ci@localhost:5432/infradesk_ci
        run: npx prisma migrate deploy
