name: Build InfraDesk TV APK

on:
  push:
    paths:
      - 'android-tv/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-tv/gradlew

      - name: Build debug APK
        run: |
          cd android-tv
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android-tv/app/build/outputs/apk/debug/app-debug.apk InfraDesk-TV.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfraDesk-TV
          path: InfraDesk-TV.apk
          retention-days: 30

      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: InfraDesk-TV.apk
          target: /var/www/infradesk/downloads/
          strip_components: 0
