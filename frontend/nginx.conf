server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25M;

    # ── Security headers ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://infradesk-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 25M;
    }

    location /uploads {
        proxy_pass http://infradesk-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* ^/downloads/(.+\.(apk|exe|zip|msi|json))$ {
        alias /downloads/$1;
        types { }
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
    }

    location = /downloads {
        try_files /index.html =404;
    }
}
